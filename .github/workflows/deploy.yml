name: Deploy AI Worker

# Auto-deploys every push to main: builds the image in Azure Container
# Registry and rolls it out to the AI container app. Mirrors the backend
# workflow so the AI service is push-to-deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # Azure OIDC login
  contents: read

jobs:
  deploy:
    name: Build & deploy to Azure Container Apps (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Password-free login via OIDC federated credential.
      # Repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build the image inside ACR (no local Docker needed).
      # Repo variable: ACR_NAME
      - name: Build & push image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image vigiscam-ai:${{ github.sha }} \
            --image vigiscam-ai:latest \
            .

      # Roll the new image out.
      # Repo variables: AI_CONTAINER_APP_NAME, RESOURCE_GROUP
      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name ${{ vars.AI_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vigiscam-ai:${{ github.sha }}

      - name: Show AI worker status
        run: |
          az containerapp show \
            --name ${{ vars.AI_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv
